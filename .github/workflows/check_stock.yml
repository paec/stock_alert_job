name: stock checker

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: run script
        env:
          CONFIG_API_URL: ${{ secrets.CONFIG_API_URL }}
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: python check_stock_clean.py 2>&1 | tee check_stock_run.log

      - name: 上傳 Log 檔案
        # 即使程式出錯 (if: always())，也要把 Log 傳上去方便排錯
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stock-report-logs
          path: check_stock_run.log
          retention-days: 7  # 檔案保留天數
